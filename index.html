    <script>
      // Aplica el tema persistido antes de pintar para evitar el flash.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'light' && t !== 'dark') t = 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
